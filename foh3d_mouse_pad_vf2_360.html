<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FOH3D — Mouse Pad VF2 · 360°</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --bg-0:#ffffff; --bg-1:#f1f2f3; --ink:#1a1b1d; --ink-dim:#6b6e73;
    --line:#d9dbdf; --panel:rgba(255,255,255,.82); --accent:#cf8419; --accent-dim:#ecd0a0;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans); color:var(--ink); overflow:hidden;
    background:radial-gradient(120% 120% at 55% 25%, var(--bg-0) 0%, var(--bg-1) 65%, #e5e6e8 100%);
    -webkit-user-select:none; user-select:none;
  }
  #stage{position:fixed; inset:0}
  canvas{display:block; touch-action:none; cursor:grab}
  canvas:active{cursor:grabbing}

  /* ---- Header: spec-sheet style ---- */
  .head{
    position:fixed; top:0; left:0; right:0; padding:18px 20px;
    display:flex; align-items:flex-start; justify-content:space-between;
    pointer-events:none; z-index:5;
  }
  .brand{font-family:var(--mono); font-size:11px; letter-spacing:.34em; color:var(--ink-dim); text-transform:uppercase}
  .title{font-size:19px; font-weight:600; letter-spacing:-.01em; margin-top:5px}
  .spec{font-family:var(--mono); font-size:11px; color:var(--ink-dim); letter-spacing:.06em; text-align:right; line-height:1.7}
  .spec b{color:var(--ink); font-weight:600}

  /* ---- Rotary encoder (signature) ---- */
  .dial{
    position:fixed; left:20px; bottom:22px; z-index:6; pointer-events:none;
    display:flex; align-items:center; gap:14px;
  }
  .dial svg{display:block; filter:drop-shadow(0 4px 14px rgba(0,0,0,.5))}
  .dial .read{font-family:var(--mono)}
  .dial .deg{font-size:26px; font-weight:600; color:var(--ink); letter-spacing:.02em; font-variant-numeric:tabular-nums}
  .dial .deg span{color:var(--accent)}
  .dial .lbl{font-size:10px; letter-spacing:.28em; color:var(--ink-dim); text-transform:uppercase; margin-top:2px}

  /* ---- Control bar ---- */
  .bar{
    position:fixed; left:50%; bottom:22px; transform:translateX(-50%); z-index:7;
    display:flex; align-items:center; gap:8px; padding:8px;
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  .btn{
    appearance:none; border:1px solid var(--line); background:#f5f6f7; color:var(--ink);
    width:40px; height:40px; border-radius:9px; cursor:pointer; display:grid; place-items:center;
    transition:border-color .15s, background .15s, color .15s;
  }
  .btn:hover{border-color:#bcbfc4; background:#ebeced}
  .btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .btn.on{border-color:var(--accent); color:var(--accent); background:#fdf4e4}
  .btn svg{width:18px; height:18px; stroke:currentColor; stroke-width:1.7; fill:none; stroke-linecap:round; stroke-linejoin:round}
  .sep{width:1px; height:26px; background:var(--line); margin:0 2px}
  .scrub{ -webkit-appearance:none; appearance:none; width:160px; height:4px; border-radius:99px;
    background:linear-gradient(90deg,var(--accent-dim),var(--line)); outline:none; cursor:pointer}
  .scrub::-webkit-slider-thumb{ -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:var(--accent); border:2px solid #141517; cursor:grab}
  .scrub::-moz-range-thumb{ width:14px; height:14px; border:2px solid #141517; border-radius:50%; background:var(--accent); cursor:grab}
  .scrub:focus-visible{outline:2px solid var(--accent); outline-offset:4px}

  .hint{
    position:fixed; right:20px; bottom:24px; z-index:6;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; color:var(--ink-dim);
    text-align:right; line-height:1.9; pointer-events:none;
  }
  .hint kbd{ background:#f5f6f7; border:1px solid var(--line); border-radius:5px; padding:1px 6px;
    font-family:var(--mono); font-size:10px; color:var(--ink)}

  .file{display:none}
  @media (max-width:620px){
    .spec{display:none}
    .hint{display:none}
    .scrub{width:96px}
    .dial .deg{font-size:20px}
  }
  @media (prefers-reduced-motion:reduce){ *{scroll-behavior:auto} }
</style>
</head>
<body>
  <div id="stage"></div>

  <div class="head">
    <div>
      <div class="brand">FOH3D&nbsp;Printing</div>
      <div class="title">Mouse Pad VF2</div>
    </div>
    <div class="spec">
      <div><b>125 × 145 × 42.5</b> mm</div>
      <div>716 facets · matte PLA</div>
    </div>
  </div>

  <div class="dial" aria-hidden="true">
    <svg width="64" height="64" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="27" fill="#f4f5f6" stroke="#d9dbdf" stroke-width="1.5"/>
      <g id="ticks"></g>
      <circle cx="32" cy="32" r="19" fill="#ffffff" stroke="#e0e2e5" stroke-width="1"/>
      <line id="needle" x1="32" y1="32" x2="32" y2="15" stroke="#cf8419" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="32" cy="32" r="2.5" fill="#cf8419"/>
    </svg>
    <div class="read">
      <div class="deg"><span id="degVal">0</span>°</div>
      <div class="lbl">Yaw</div>
    </div>
  </div>

  <div class="bar" role="toolbar" aria-label="Viewer controls">
    <button class="btn on" id="spin" title="Auto-rotate (Space)" aria-pressed="true">
      <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v4h-4"/></svg>
    </button>
    <button class="btn" id="wire" title="Wireframe" aria-pressed="false">
      <svg viewBox="0 0 24 24"><path d="M12 2 3 7v10l9 5 9-5V7z"/><path d="M3 7l9 5 9-5M12 12v10"/></svg>
    </button>
    <button class="btn" id="reset" title="Reset view (R)">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 3v6h6"/></svg>
    </button>
    <div class="sep"></div>
    <input class="scrub" id="scrub" type="range" min="0" max="359" value="0" aria-label="Rotation angle">
    <div class="sep"></div>
    <button class="btn" id="load" title="Load a different STL">
      <svg viewBox="0 0 24 24"><path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M5 20h14"/></svg>
    </button>
    <input class="file" id="fileInput" type="file" accept=".stl">
  </div>

  <div class="hint">
    drag&nbsp;·&nbsp;spin&nbsp;&nbsp;|&nbsp;&nbsp;scroll&nbsp;·&nbsp;zoom<br>
    <kbd>←</kbd><kbd>→</kbd>&nbsp;rotate&nbsp;&nbsp;<kbd>space</kbd>&nbsp;auto
  </div>

// ---- decode embedded geometry (Float32 xyz triplets) ----
function b64ToFloat32(b64){
  const bin = atob(b64); const len = bin.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
  return new Float32Array(bytes.buffer);
}

// ---- STL parser (binary + ascii) for the Load button ----
function parseSTL(buf){
  const dv = new DataView(buf);
  const n = buf.byteLength>=84 ? dv.getUint32(80,true) : 0;
  const isBinary = buf.byteLength === 84 + n*50 && n>0;
  const pos = [];
  if(isBinary){
    let o = 84;
    for(let i=0;i<n;i++){
      o += 12; // skip normal
      for(let v=0;v<3;v++){ pos.push(dv.getFloat32(o,true),dv.getFloat32(o+4,true),dv.getFloat32(o+8,true)); o+=12; }
      o += 2;
    }
  } else {
    const txt = new TextDecoder().decode(buf);
    const re = /vertex\s+([\-+0-9.eE]+)\s+([\-+0-9.eE]+)\s+([\-+0-9.eE]+)/g; let m;
    while((m=re.exec(txt))) pos.push(parseFloat(m[1]),parseFloat(m[2]),parseFloat(m[3]));
  }
  return new Float32Array(pos);
}

// ---- three.js scene ----
let renderer, scene, camera, pivot, mesh, ground, raf;
let yaw = 0.62, pitch = -0.34, dist = 4.6;
let autoRotate = true, wireframe = false;
const stage = document.getElementById('stage');
const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
if(reduce){ autoRotate = false; }

function buildGeometry(arr){
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  g.rotateX(-Math.PI/2);          // STL Z-up -> three Y-up
  // recenter + normalize so any loaded model frames the same
  g.computeBoundingBox();
  const bb = g.boundingBox, c = new THREE.Vector3(); bb.getCenter(c);
  g.translate(-c.x,-c.y,-c.z);
  const s = new THREE.Vector3(); bb.getSize(s);
  const k = 2.0/Math.max(s.x,s.y,s.z);
  g.scale(k,k,k);
  g.computeVertexNormals();
  return g;
}

function setModel(geometry){
  if(mesh){ pivot.remove(mesh); mesh.geometry.dispose(); }
  if(ground){ scene.remove(ground); }
  const mat = new THREE.MeshStandardMaterial({ color:0x1b1c1e, roughness:0.58, metalness:0.06, flatShading:true });
  mesh = new THREE.Mesh(geometry, mat);
  mesh.castShadow = true; mesh.receiveShadow = false;
  pivot.add(mesh);

  // contact shadow plane at model base
  geometry.computeBoundingBox();
  const minY = geometry.boundingBox.min.y;
  const gMat = new THREE.ShadowMaterial({ opacity:0.18 });
  ground = new THREE.Mesh(new THREE.PlaneGeometry(40,40), gMat);
  ground.rotation.x = -Math.PI/2; ground.position.y = minY - 0.001;
  ground.receiveShadow = true;
  scene.add(ground);
  applyWire();
}

function applyWire(){ if(mesh) mesh.material.wireframe = wireframe; }

function init(){
  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  stage.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);

  pivot = new THREE.Group();
  scene.add(pivot);

  // lighting — studio key/fill/rim to match the matte render
  scene.add(new THREE.HemisphereLight(0xffffff, 0xc6cace, 0.72));
  const key = new THREE.DirectionalLight(0xffffff, 1.15);
  key.position.set(4,7,5); key.castShadow = true;
  key.shadow.mapSize.set(1024,1024);
  key.shadow.camera.near=1; key.shadow.camera.far=20;
  key.shadow.camera.left=-4; key.shadow.camera.right=4; key.shadow.camera.top=4; key.shadow.camera.bottom=-4;
  key.shadow.bias=-0.0004; key.shadow.radius=4;
  scene.add(key);
  const fill = new THREE.DirectionalLight(0x9fb4c8, 0.28); fill.position.set(-6,2,-3); scene.add(fill);
  const rim = new THREE.DirectionalLight(0xffffff, 0.5); rim.position.set(-2,4,-6); scene.add(rim);

  setModel(buildGeometry(b64ToFloat32(GEOM_B64)));
  buildTicks();
  resize();
  window.addEventListener('resize', resize);
  loop();
}

function resize(){
  const w = stage.clientWidth, h = stage.clientHeight;
  renderer.setSize(w,h); camera.aspect = w/h; camera.updateProjectionMatrix();
}

function loop(){
  raf = requestAnimationFrame(loop);
  if(autoRotate) yaw += 0.0055;
  pivot.rotation.y = yaw;
  pivot.rotation.x = pitch;
  const cy = Math.sin(0)*0; // camera fixed; pivot carries rotation
  camera.position.set(0, 1.15, dist);
  camera.lookAt(0, 0, 0);
  renderer.render(scene,camera);
  updateDial();
}

// ---- rotary dial ----
function buildTicks(){
  const g = document.getElementById('ticks');
  for(let i=0;i<24;i++){
    const a = (i/24)*Math.PI*2;
    const x1=32+Math.sin(a)*24, y1=32-Math.cos(a)*24;
    const x2=32+Math.sin(a)*(i%6===0?20:22), y2=32-Math.cos(a)*(i%6===0?20:22);
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke', i%6===0 ? '#a8abb0':'#d2d4d8'); l.setAttribute('stroke-width', i%6===0?1.4:1);
    g.appendChild(l);
  }
}
const needle = document.getElementById('needle');
const degVal = document.getElementById('degVal');
const scrub = document.getElementById('scrub');
function deg(){ let d = (yaw*180/Math.PI)%360; if(d<0) d+=360; return d; }
function updateDial(){
  const d = deg();
  needle.setAttribute('transform', `rotate(${d} 32 32)`);
  degVal.textContent = Math.round(d);
  if(!draggingScrub) scrub.value = Math.round(d);
}

// ---- pointer drag (yaw + pitch) ----
let drag=false, px=0, py=0;
const el = () => renderer.domElement;
function down(e){ drag=true; autoSet(false); const p=pt(e); px=p.x; py=p.y; }
function move(e){
  if(!drag) return;
  const p=pt(e); const dx=p.x-px, dy=p.y-py; px=p.x; py=p.y;
  yaw += dx*0.01;
  pitch = Math.max(-1.35, Math.min(0.25, pitch + dy*0.008));
}
function up(){ drag=false; }
function pt(e){ const t=e.touches?e.touches[0]:e; return {x:t.clientX, y:t.clientY}; }
stage.addEventListener('pointerdown', down);
window.addEventListener('pointermove', move);
window.addEventListener('pointerup', up);
stage.addEventListener('wheel', e=>{ e.preventDefault(); dist = Math.max(2.6, Math.min(9, dist + (e.deltaY>0?0.4:-0.4))); }, {passive:false});

// pinch zoom
let pinch=0;
stage.addEventListener('touchmove', e=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.hypot(dx,dy);
    if(pinch) dist = Math.max(2.6, Math.min(9, dist + (pinch-d)*0.012));
    pinch=d; e.preventDefault();
  }
},{passive:false});
stage.addEventListener('touchend', ()=>pinch=0);

// ---- controls ----
const spinBtn=document.getElementById('spin'), wireBtn=document.getElementById('wire');
function autoSet(v){ autoRotate=v; spinBtn.classList.toggle('on',v); spinBtn.setAttribute('aria-pressed',v); }
spinBtn.onclick=()=>autoSet(!autoRotate);
wireBtn.onclick=()=>{ wireframe=!wireframe; wireBtn.classList.toggle('on',wireframe); wireBtn.setAttribute('aria-pressed',wireframe); applyWire(); };
document.getElementById('reset').onclick=()=>{ yaw=0.62; pitch=-0.34; dist=4.6; };

let draggingScrub=false;
scrub.addEventListener('pointerdown',()=>{ draggingScrub=true; autoSet(false); });
window.addEventListener('pointerup',()=>draggingScrub=false);
scrub.addEventListener('input',()=>{ yaw = scrub.value*Math.PI/180; });

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'){ autoSet(false); yaw-=0.08; }
  else if(e.key==='ArrowRight'){ autoSet(false); yaw+=0.08; }
  else if(e.key==='ArrowUp'){ pitch=Math.max(-1.35,pitch-0.06); }
  else if(e.key==='ArrowDown'){ pitch=Math.min(0.25,pitch+0.06); }
  else if(e.key==='+'||e.key==='='){ dist=Math.max(2.6,dist-0.4); }
  else if(e.key==='-'){ dist=Math.min(9,dist+0.4); }
  else if(e.key===' '){ e.preventDefault(); autoSet(!autoRotate); }
  else if(e.key.toLowerCase()==='r'){ yaw=0.62; pitch=-0.34; dist=4.6; }
});

// ---- load other STL ----
const fileInput=document.getElementById('fileInput');
document.getElementById('load').onclick=()=>fileInput.click();
fileInput.onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ setModel(buildGeometry(parseSTL(r.result))); yaw=0.62; pitch=-0.34; dist=4.6; document.querySelector('.title').textContent=f.name.replace(/\.stl$/i,''); }catch(err){ alert('Could not read that STL.'); } };
  r.readAsArrayBuffer(f);
};

init();
</script>
</body>
</html>
